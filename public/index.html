<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Anket</title>
</head>
<body>

<h2>Anket Oluştur</h2>

<input id="question" placeholder="Soru"><br><br>
<input id="opt1" placeholder="Seçenek 1"><br><br>
<input id="opt2" placeholder="Seçenek 2"><br><br>

<button onclick="createSurvey()">Oluştur</button>

<h2>Anketler</h2>
<div id="list"></div>

<script>
const API = window.location.origin;

async function createSurvey() {
  const question = document.getElementById("question").value;
  const opt1 = document.getElementById("opt1").value;
  const opt2 = document.getElementById("opt2").value;

  console.log("butona basıldı"); // test

  await fetch(API + "/survey", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      question,
      options: [opt1, opt2]
    })
  });

  loadSurveys();
}

async function loadSurveys() {
  const res = await fetch(API + "/survey");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");

    div.innerHTML = `
      <b>${s.question}</b><br>
      ${s.options.map((opt, i) => `
        <button onclick="vote('${s.id}', ${i})">
          ${opt} (${s.votes[i]})
        </button>
      `).join("")}
      <hr>
    `;

    list.appendChild(div);
  });
}

async function vote(id, index) {
  await fetch(`${API}/vote/${id}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ optionIndex: index })
  });

  loadSurveys();
}

loadSurveys();
</script>

</body>
</html>
